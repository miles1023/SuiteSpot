          - generic [ref=e188]:
            - paragraph [ref=e189]: Want the powerful flexibility of ImGui for a simple text overlay? Here's how.
            - paragraph [ref=e190]:
              - text: First make sure you've uncommented all of the plugin window code in the template's .h file. Then in your GUI file go to the render() function. For a custom overlay, you'll need to prepare flags for it to appear the way you want it to.
              - text: These are found at
              - link "line 744 of imgui.h" [ref=e191] [cursor=pointer]:
                - /url: https://github.com/Martinii89/BakkesmodPluginTemplate/blob/master/IMGUI/imgui.h#L744
            - paragraph [ref=e192]:
              - text: "Some useful flags for an overlay are:"
              - code [ref=e193]: ImGuiWindowFlags_NoTitleBar
              - text: removes the title bar
              - code [ref=e194]: ImGuiWindowFlags_NoScrollbar
              - text: disables a scroll bar from appearing
              - code [ref=e195]: ImGuiWindowFlags_AlwaysAutoResize
              - text: automatically resizes the window to fit the content
              - code [ref=e196]: ImGuiWindowFlags_NoDecoration
              - text: removes the scrollbar, title bar, and disables manual resizing
              - code [ref=e197]: ImGuiWindowFlags_NoFocusOnAppearing
              - text: prevents the overlay from stealing focus from other ImGui windows
              - code [ref=e198]: ImGuiWindowFlags_NoInputs
              - text: makes the mouse pass right through the window to RL
              - code [ref=e199]: ImGuiWindowFlags_NoBackground
              - text: disables the background of the window
            - paragraph [ref=e200]: Here's an example of starting a window with some flags
            - code [ref=e202]: "ImGuiWindowFlags WindowFlags = ImGuiWindowFlags_NoDecoration | ImGuiWindowFlags_AlwaysAutoResize | ImGuiWindowFlags_NoFocusOnAppearing; // If moveOverlay is true, the user can move the overlay // When false the overlay window no longer accepts input // I find this useful to connect to a CVar and checkbox in the plugin's settings // You can allow a user to move the overlay only when they want if (!moveOverlay) { WindowFlags |= ImGuiWindowFlags_NoInputs; } // creates the window with the given flags if (!ImGui::Begin(menuTitle_.c_str(), &isWindowOpen_, WindowFlags)) { ImGui::End(); return; } // Do your overlay rendering with full ImGui here!"
            - paragraph [ref=e203]: If you don't want the overlay to close when a user presses esc, change this function to return false
            - code [ref=e205]: "bool PluginName::IsActiveOverlay() { return false; }"
