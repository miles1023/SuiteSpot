          - heading "Toasts" [level=1] [ref=e204]
          - generic [ref=e207]:
            - generic [ref=e208]:
              - img [ref=e209]
              - text: Last edited by
              - link "JerryTheBee" [ref=e212] [cursor=pointer]:
                - /url: /members/JerryTheBee
            - generic [ref=e213]:
              - img [ref=e214]
              - text: 10/15/2025
          - generic [ref=e218]:
            - paragraph [ref=e219]: Toasts are cool little popups that show on the top right of your game
            - paragraph:
              - img "toast example"
            - paragraph [ref=e220]: These are useful for quick notifications that you want to disappear quickly
            - paragraph [ref=e221]: First you need to enable them in f2 - Misc - Enable notifications
            - paragraph:
              - img "enable notifications"
            - paragraph [ref=e222]:
              - text: Watch out though! Every user also has to enable this, so make sure your plugin page or
              - link "interface" [ref=e223] [cursor=pointer]:
                - /url: /wiki/bakkesmod-sdk/wiki/bakkesmod-sdk/plugin-tutorial/plugin-interface
              - text: is quite clear that this is necessary
            - paragraph [ref=e224]: Now to the code
            - paragraph [ref=e225]:
              - text: Make a toast pop up with
              - link "GameWrapper" [ref=e226] [cursor=pointer]:
                - /url: /wiki/bakkesmod-sdk/classes/wrappers/gamewrapper
              - link ".Toast()" [ref=e227] [cursor=pointer]:
                - /url: https://github.com/bakkesmodorg/BakkesModSDK/blob/master/include/bakkesmod/wrappers/GameWrapper.h#L111
            - paragraph [ref=e228]: There are 7 parameters. The first two are required. They are
            - list [ref=e229]:
              - listitem [ref=e230]: The title, which is the word on top
              - listitem [ref=e231]: The text, which is the smaller text below
              - listitem [ref=e232]: The texture name which I'll explain in the next paragraph
              - listitem [ref=e233]: The time to show the toast, which defaults to 3.5 seconds
              - listitem [ref=e234]:
                - text: The
                - link "ToastType" [ref=e235] [cursor=pointer]:
                  - /url: /wiki/bakkesmod-sdk/enums/toasttype
                - text: ", which chooses the color and defaults to black"
              - listitem [ref=e236]: The width in pixels. The toast automatically resizes to fit your text, so don't worry about these too much
              - listitem [ref=e237]: The height in pixels
            - paragraph [ref=e238]:
              - text: If you want to have a custom image, load it in your onLoad() using
              - link "GameWrapper" [ref=e239] [cursor=pointer]:
                - /url: /wiki/bakkesmod-sdk/classes/wrappers/gamewrapper
              - text: .LoadToastTexture(). Provide the function with a name for your toast, and the path to the image. Most likely you'll want it to be in the data folder.
            - paragraph [ref=e240]: Toasts can be one of 4 colors based on the ToastType
            - paragraph:
              - img "Image of 4 toast colors"
            - paragraph [ref=e241]:
              - text: I've made an example using CoolPlugin. I put this code in the onLoad() in CoolPlugin.cpp and cool.png in the
              - code [ref=e242]: bakkesmod/data
              - text: folder
            - code [ref=e244]: "gameWrapper->LoadToastTexture(\"cool\", gameWrapper->GetDataFolder() / \"cool.png\"); cvarManager->registerNotifier(\"cool_toast\", [this](std::vector<std::string> args) { gameWrapper->Toast(\"Whoa you're cool\", \"Super cool\", \"cool\", 5.0, ToastType_Warning); }, \"\", PERMISSION_ALL);"
            - paragraph [ref=e245]:
              - text: The result when I call
              - code [ref=e246]: cool_toast
              - text: from the f6 console
            - paragraph:
              - img "toast in action"
            - paragraph [ref=e247]: For perspective, it's quite small but still legible
            - paragraph:
              - img "image of toast zoomed in"
            - paragraph [ref=e248]:
              - text: Full code here
              - link "https://github.com/ubelhj/BakkesModStarterPlugin/tree/toasts" [ref=e249] [cursor=pointer]:
                - /url: https://github.com/ubelhj/BakkesModStarterPlugin/tree/toasts
