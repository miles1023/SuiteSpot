          - generic [ref=e194]:
            - paragraph [ref=e195]: This will go over creating a user-friendly interface. There's buttons, sliders, checkboxes, dropdowns, and all sorts of options. It also assumes you're using the template, as the template automatically includes the ImGui GUI library we'll be using. It also adds a file we'll be editing
            - paragraph [ref=e196]:
              - text: Yet again we have the
              - code [ref=e197]: CoolPlugin
              - text: from
              - link "Plugin Variables" [ref=e198] [cursor=pointer]:
                - /url: /wiki/bakkesmod-sdk/plugin-tutorial/plugin-variables
              - text: and we want to add a button to activate our cooler ball on top, a checkbox to enable cool, and a slider to choose the distance that the ball is placed from your car
            - paragraph [ref=e199]:
              - text: First we need to uncomment some code in
              - code [ref=e200]: CoolPlugin.h
            - paragraph [ref=e201]:
              - text: At the class declaration, uncomment
              - code [ref=e202]: SettingsWindowBase
              - text: and
              - code [ref=e203]: RenderSettings
            - code [ref=e205]: "class CoolPlugin: public BakkesMod::Plugin::BakkesModPlugin, public SettingsWindowBase // ... void RenderSettings() override;"
            - paragraph [ref=e206]:
              - text: Now we can define those 3 functions to create the interface. We will put these in a new file
              - code [ref=e207]: CoolPluginSettings.cpp
              - text: but they can be in any
              - code [ref=e208]: .cpp
              - text: file that includes
              - code [ref=e209]: CoolPlugin.h
              - text: ", such as"
              - code [ref=e210]: CoolPlugin.cpp
            - paragraph [ref=e211]:
              - text: To add a file, right click the src (or any other) folder in the solution explorer, then add a new item
              - img "Adding a new item to the solution"
            - paragraph [ref=e212]:
              - text: Add a .cpp file with the name of your choice.
              - img "Naming the cpp file"
            - paragraph [ref=e213]:
              - text: In the file, make sure to include
              - code [ref=e214]: pch.h
              - text: and
              - code [ref=e215]: CoolPlugin.h
              - text: at the top
            - code [ref=e217]: "# include \"pch.h\" # include \"CoolPlugin.h\""
            - paragraph [ref=e218]:
              - text: Now you can create the interface. We'll start with simple text but this is what we'll be modifying in the rest of this page
              - text: There's a hugely important thing to consider with this function. Never call on or change any Rocket League / Bakkesmod values here. If you do, you will crash. It's happening outside of the game, and cannot safely alter it. That means that if you have a
              - code [ref=e219]: CVarWrapper.addOnValueChanged()
              - text: that alters the state of the game, it will be unsafe to use here
            - code [ref=e221]: "void CoolPlugin::RenderSettings() { ImGui::TextUnformatted(\"A really cool plugin\"); }"
            - paragraph [ref=e222]:
              - text: Lets start building the plugin interface. First we'll have a button that'll call
              - code [ref=e223]: CoolerBallOnTop
              - text: . The button as well as most other interactable ImGui components has a boolean property. If it's true, that means it's been interacted with. So when the button has been clicked, we'll use the cvarManager to call
              - code [ref=e224]: CoolerBallOnTop
              - text: . But
              - code [ref=e225]: CoolerBallOnTop
              - text: uses the ServerWrapper and alters the game. It'll crash! We can wrap it inside
              - code [ref=e226]: gameWrapper->Execute()
              - text: . We'll also add hover text because why not
            - code [ref=e228]: "if (ImGui::Button(\"Ball On Top\")) { gameWrapper->Execute([this](GameWrapper* gw) { cvarManager->executeCommand(\"CoolerBallOnTop\"); }); } if (ImGui::IsItemHovered()) { ImGui::SetTooltip(\"Activate Ball On Top\"); }"
            - paragraph:
              - img "The button"
            - paragraph [ref=e229]:
              - text: Now let's do a checkbox for
              - code [ref=e230]: cool_enabled
              - text: . First we need to get the CVar, then use it. The
              - code [ref=e231]: bool enabled
              - text: is necessary, as the checkbox uses that to store whether or not the checkbox should be checked. You can't just use the CVar
            - code [ref=e233]: "CVarWrapper enableCvar = cvarManager->getCvar(\"cool_enabled\"); if (!enableCvar) { return; } bool enabled = enableCvar.getBoolValue(); if (ImGui::Checkbox(\"Enable plugin\", &enabled)) { enableCvar.setValue(enabled); } if (ImGui::IsItemHovered()) { ImGui::SetTooltip(\"Toggle Cool Plugin\"); }"
            - paragraph [ref=e234]:
              - text: And finally a slider for the distance CVar.
              - text: ImGui elements use
              - code [ref=e235]: char *
              - text: instead of
              - code [ref=e236]: std::string
              - text: You can easily convert between with
              - code [ref=e237]: std::string.c_str()
              - text: and
              - code [ref=e238]: std::string newStringVariableName(char *)
            - code [ref=e240]: "CVarWrapper distanceCvar = cvarManager->getCvar(\"cool_distance\"); if (!distanceCvar) { return; } float distance = distanceCvar.getFloatValue(); if (ImGui::SliderFloat(\"Distance\", &distance, 0.0, 500.0)) { distanceCvar.setValue(distance); } if (ImGui::IsItemHovered()) { std::string hoverText = \"distance is \" + std::to_string(distance); ImGui::SetTooltip(hoverText.c_str()); }"
            - paragraph:
              - img "The slider"
            - paragraph [ref=e241]: We finally have a settings file using all of our CVars. There's a load more things you can do with ImGui, but hopefully this is enough to get the right idea and get started. I hope that by covering these three elements I covered most of what plugins need to use. ImGui is complicated and most plugins don't use it yet. Feel free to ask questions
            - paragraph [ref=e242]:
              - text: Here's the final code
              - link "https://github.com/ubelhj/BakkesModStarterPlugin/blob/plugin-interface/CoolPlugin/CoolPluginSettings.cpp" [ref=e243] [cursor=pointer]:
