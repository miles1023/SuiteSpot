 draco\\r\\n\\r\\nEpic games download: https://drive.google.com/file/d/1SaarpLvYET_iwYP_uwbHeK3kTd-vrGFv/view?usp=drive_link\\r\\n\\r\\nWhat do you need to play?\\r\\n\\r\\nWorkshop textures (https://www.speedrun.com/rocketleague/resources/37ylq)\\r\\nYou might want to disable the ball arrows as all the eggs are balls and there is no way to remove the arrows in the map itself\\r\\n\\r\\nContest\\r\\n\\r\\nBe the first player to finish without any checkpoints and send me video proof and I'll add your character (egg) into the map with the dialogue of your choice!\\r\\n\\r\\n\\r\\n\\r\\nThis is a single player parkour map (No boost allowed) based around the rage genre of climbing games like getting over it. It was inspired by the map DeepDip In trackmania where you have to climb a tower all the way to the top. There is some dialogue to cheer you up during the climb but you can choose to disable it if you want (Just don't push my friends off the tower please).\\r\\n\\r\\nModes\\r\\n\\r\\nThere are two modes in the map one without checkpoints which is the way you usually play these types of games, but I have also added a version with a checkpoint on each floor so it is more fun to play for people that don't want to reset all the way to the bottom when they fall\\r\\n\\r\\n\\r\\n\\r\\nWill you be able to climb all the way to the top and claim the legendary boost that is said to give you infinite boost?\\r\\n\\r\\nSpecial thanks to Dirtydaub for providing the tower's base model!\",\"name\":\"Need Boost\",\"name_with_namespace\":\"Dirty Daub / Need Boost\",\"path\":\"need-boost\",\"path_with_namespace\":\"dirtydaub/need-boost\",\"created_at\":\"2025-08-24T12:43:36.186Z\",\"default_branch\":\"main\",\"tag_list\":[],\"topics\":[],\"ssh_url_to_repo\":\"git@celab.jetfox.ovh:dirtydaub/need-boost.git\",\"http_url_to_repo\":\"https://celab.jetfox.ovh/dirtydaub/need-boost.git\",\"web_url\":\"https://celab.jetfox.ovh/dirtydaub/need-boost\",\"readme_url\":\"https://celab.jetfox.ovh/d