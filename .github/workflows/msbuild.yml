name: CI/CD

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write   # required for creating releases

env:
  BUILD_CONFIGURATION: Release
  PLATFORM: x64
  SOLUTION: SuiteSpot.sln

jobs:
  # ─────────────────────────────────────────────
  # CI — build on every push and PR
  # ─────────────────────────────────────────────
  build:
    name: Build (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # Cache BakkesMod SDK by commit SHA — changes rarely
      - name: Cache BakkesMod SDK
        id: cache-bakkesmod
        uses: actions/cache@v4
        with:
          path: bakkesmodsdk
          key: bakkesmodsdk-479e8f571cf554b25f4eeb64d611dec4133edcaf

      - name: Clone BakkesMod SDK
        if: steps.cache-bakkesmod.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/bakkesmodorg/BakkesModSDK.git bakkesmodsdk
          git -C bakkesmodsdk checkout 479e8f571cf554b25f4eeb64d611dec4133edcaf

      # Cache vcpkg_installed/ in the project dir — where manifest mode writes packages
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg_installed
          key: vcpkg-x64-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-x64-windows-

      - name: Setup vcpkg
        run: |
          vcpkg integrate install
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: Build
        run: |
          msbuild /m `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:Platform=${{ env.PLATFORM }} `
            /p:BakkesModPath="${{ github.workspace }}" `
            /p:VcpkgRoot="C:\vcpkg" `
            /v:minimal `
            ${{ env.SOLUTION }}

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuiteSpot-${{ github.sha }}
          path: plugins/SuiteSpot.dll
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────
  # CD — rolling "latest" release on main,
  #      versioned release on v* tags
  # ─────────────────────────────────────────────
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: SuiteSpot-${{ github.sha }}
          path: release/

      # Versioned release — triggered by v* tag
      - name: Extract changelog entry
        if: startsWith(github.ref, 'refs/tags/v')
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          NOTES=$(awk "/^## \[${TAG#v}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SuiteSpot ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: release/SuiteSpot.dll
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      # Rolling "latest" pre-release — updated on every push to main
      - name: Update latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automated build from `main` — commit ${{ github.sha }}

            ${{ github.event.head_commit.message }}

            > This release is updated on every push to main. For stable versioned releases, see the [releases page](../../releases).
          files: release/SuiteSpot.dll
          draft: false
          prerelease: true
          make_latest: false
